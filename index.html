<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The FDE Mindset Atlas — Karsun-FDE</title>
<meta name="description" content="An interactive, zoomable, fully-cited mind-map of the Forward Deployed Engineer mindset — click to expand nodes & edges, zoom in to dive deeper, zoom out to climb back. Scenarios, decomposition, knowledge & context graphs, and the ReDuX / GalentAI end-goal.">
<meta property="og:title" content="The FDE Mindset Atlas">
<meta property="og:description" content="Interactive zoomable mind-map of the FDE mindset, graphs, decomposition, and the Karsun ReDuX end-goal.">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="graph-mode">
<header class="bar">
  <div class="bar-in">
    <div class="brand" id="brand"><span class="dot"></span> FDE Mindset Atlas</div>
    <nav class="crumbs" id="bcrumb">The FDE Mindset</nav>
    <div class="right">Karsun-FDE · /web-research grounded</div>
  </div>
</header>

<main id="stage">
  <svg id="graph" role="img" aria-label="Interactive FDE mind-map"></svg>

  <div id="hud">
    <div class="hud-controls">
      <button id="cZin"   title="Zoom in">+</button>
      <button id="cZout"  title="Zoom out">&minus;</button>
      <button id="cUp"    title="Climb up a layer">&#8624;</button>
      <button id="cExpand" title="Expand the whole map">&#9783;</button>
      <button id="cReset" title="Reset view">&#8635;</button>
    </div>
    <div class="hud-hint">
      <strong>Click</strong> a node to expand it &amp; reveal its edges ·
      <strong>scroll-in near a node</strong> to dive deeper ·
      <strong>scroll-out</strong> to climb back ·
      <strong>drag</strong> to pan · click a leaf to read the cited detail.
    </div>
  </div>

  <div id="scrim"></div>
  <aside id="drawer" aria-live="polite"></aside>
</main>

<script src="assets/js/content.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
